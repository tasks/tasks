name: Assemble bundle

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    uses: ./.github/workflows/check.yml

  pebble:
    runs-on: ubuntu-latest
    needs: [ check ]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache Pebble SDK
        id: cache-pebble
        uses: actions/cache@v4
        with:
          path: ~/.pebble-sdk
          key: pebble-sdk-${{ runner.os }}

      - name: Install Pebble SDK
        run: |
          pip install pebble-tool
          if [ "${{ steps.cache-pebble.outputs.cache-hit }}" != "true" ]; then
            pebble sdk install latest
          fi

      - name: Install emulator dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libsdl1.2debian libfdt1 librsvg2-bin

      - name: Build Pebble app
        run: cd pebble && pebble build

      - name: Generate screenshots
        run: |
          export DISPLAY=:99
          Xvfb :99 &
          sleep 2
          cd pebble && ./screenshots.sh

      - name: Generate store icons
        run: |
          mkdir -p pebble/screenshots
          rsvg-convert -w 48 -h 48 graphics/icon.svg -o pebble/screenshots/icon_48.png
          rsvg-convert -w 80 -h 80 graphics/icon.svg -o pebble/screenshots/icon_80.png
          rsvg-convert -w 144 -h 144 graphics/icon.svg -o pebble/screenshots/icon_144.png
          rsvg-convert -w 720 -h 320 graphics/promo.svg -o pebble/screenshots/banner_720x320.png

      - name: Upload Pebble app
        uses: actions/upload-artifact@v7
        with:
          name: pebble.pbw
          path: pebble/build/pebble.pbw

      - name: Upload store assets
        uses: actions/upload-artifact@v7
        with:
          name: pebble-store-assets
          path: pebble/screenshots/

  android:
    runs-on: ubuntu-latest
    needs: [ check ]
    steps:
      - name: Decode Keystore
        run: |
          echo ${{ secrets.KEY_STORE }} | base64 -di > "${RUNNER_TEMP}"/keystore.jks
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Bundle
        env:
          KEY_PATH: ${{ runner.temp }}/keystore.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          MAPBOX_KEY: ${{ secrets.MAPBOX_KEY }}
          GOOGLE_KEY: ${{ secrets.GOOGLE_KEY }}
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
        run: bundle exec fastlane bundle

      - name: Upload app APK
        uses: actions/upload-artifact@v7
        with:
          name: app-googleplay-release.apk
          path: app/build/outputs/bundle/googleplayRelease/app-googleplay-release.apk
      - name: Upload wear APK
        uses: actions/upload-artifact@v7
        with:
          name: wear-release.apk
          path: wear/build/outputs/bundle/release/wear-release.apk
      - name: Upload release bundles
        uses: actions/upload-artifact@v7
        with:
          name: release
          path: |
            app/build/outputs/bundle/googleplayRelease/app-googleplay-release.aab
            app/build/outputs/mapping/googleplayRelease/mapping.txt
            wear/build/outputs/bundle/release/wear-release.aab
            wear/build/outputs/mapping/release/mapping.txt

  android-other:
    runs-on: ubuntu-latest
    needs: [ check ]
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Decode generic keystore
        run: echo "${{ secrets.GENERIC_KEY_STORE }}" | base64 -d > "${RUNNER_TEMP}/generic.jks"

      - name: Build generic and composeApp APKs
        run: >
          ./gradlew
          :app:assembleGenericRelease
          :composeApp:assembleGoogleplayRelease
          -PtasksKeyAlias=${{ secrets.GENERIC_KEY_ALIAS }}
          -PtasksStoreFile=${{ runner.temp }}/generic.jks
          -PtasksStorePassword=${{ secrets.GENERIC_KEY_STORE_PASSWORD }}
          -PtasksKeyPassword=${{ secrets.GENERIC_KEY_PASSWORD }}
          -Ptasks_mapbox_key=${{ secrets.MAPBOX_KEY }}

      - name: Upload generic APK
        uses: actions/upload-artifact@v7
        with:
          name: app-generic-release.apk
          path: app/build/outputs/apk/generic/release/app-generic-release.apk

      - name: Upload composeApp APK
        uses: actions/upload-artifact@v7
        with:
          name: composeApp-googleplay-release.apk
          path: composeApp/build/outputs/apk/googleplay/release/composeApp-googleplay-release.apk

  desktop:
    runs-on: ubuntu-latest
    needs: [ check ]
    strategy:
      matrix:
        include:
          - platform: linux
            target: linux-app
            flags: ""
          - platform: macos-amd64
            target: unnotarized-mac-zip
            flags: "-Kapp.machines=mac.amd64"
          - platform: macos-aarch64
            target: unnotarized-mac-zip
            flags: "-Kapp.machines=mac.aarch64"
          - platform: windows
            target: windows-app
            flags: ""
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build desktop jar
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
        run: ./gradlew :composeApp:desktopJar

      - name: Install Conveyor
        run: npm install -g @hydraulic/conveyor

      - name: Generate signing key if absent
        env:
          CONVEYOR_AGREE_TO_LICENSE: 1
          SIGNING_KEY: ${{ secrets.CONVEYOR_SIGNING_KEY }}
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            conveyor keys generate --no-passphrase
          fi

      - name: Build ${{ matrix.platform }} desktop
        working-directory: composeApp
        env:
          CONVEYOR_AGREE_TO_LICENSE: 1
          SIGNING_KEY: ${{ secrets.CONVEYOR_SIGNING_KEY }}
        run: |
          [ -z "$SIGNING_KEY" ] && unset SIGNING_KEY
          conveyor ${{ matrix.flags }} make ${{ matrix.target }}

      - name: Upload desktop-linux-deb
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-deb
          path: composeApp/output/*.deb

      - name: Upload desktop-linux-tar-gz
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-tar-gz
          path: composeApp/output/*.tar.gz

      - name: Upload desktop-macos-zip
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.platform }}-zip
          path: composeApp/output/*.zip

      - name: Upload desktop-windows-msix
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: desktop-windows-msix
          path: composeApp/output/*.msix

      - name: Upload desktop-windows-zip
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: desktop-windows-zip
          path: composeApp/output/*.zip
