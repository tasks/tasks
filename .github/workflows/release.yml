name: GitHub Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  bundle:
    uses: ./.github/workflows/bundle.yml
    secrets: inherit

  release:
    runs-on: ubuntu-latest
    needs: [ bundle ]
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Download Play-signed APK
        env:
          FASTLANE: ${{ secrets.FASTLANE }}
        run: |
          echo "$FASTLANE" > ./fastlane.json
          bundle exec fastlane download_signed_apk
          rm ./fastlane.json

      - uses: actions/download-artifact@v8
        with:
          name: app-generic-release.apk
          path: artifacts
      - uses: actions/download-artifact@v8
        with:
          name: pebble.pbw
          path: artifacts
      - uses: actions/download-artifact@v8
        with:
          name: desktop-linux-appimage
          path: artifacts

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Download desktop jars
        uses: actions/download-artifact@v8
        with:
          name: desktop-jar

      - uses: ./.github/actions/install-conveyor

      - name: Cache Conveyor downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/hydraulic/conveyor
          key: conveyor-release

      - name: Write Apple notarization key
        env:
          APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
        if: ${{ env.APPLE_PRIVATE_KEY != '' }}
        run: echo "$APPLE_PRIVATE_KEY" > "$RUNNER_TEMP/apple_api_key.p8"

      - name: Build notarized desktop releases
        working-directory: composeApp
        env:
          SIGNING_KEY: ${{ secrets.CONVEYOR_SIGNING_KEY }}
          CONVEYOR_AGREE_TO_LICENSE: 1
        run: >
          conveyor
          -vvv
          -Kapp.mac.notarization.issuer-id=${{ secrets.APPLE_ISSUER_ID }}
          -Kapp.mac.notarization.key-id=${{ secrets.APPLE_KEY_ID }}
          -Kapp.mac.notarization.private-key=${{ runner.temp }}/apple_api_key.p8
          make site

      - name: Rename artifacts
        run: |
          TAG=${GITHUB_REF_NAME}
          mv artifacts/app-generic-release.apk "tasks-fdroid-${TAG}.apk"
          mv tasks-googleplay-release.apk "tasks-googleplay-${TAG}.apk"
          mv artifacts/pebble.pbw "tasks-pebble-${TAG}.pbw"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: release-artifacts
          path: |
            tasks-fdroid-*.apk
            tasks-googleplay-*.apk
            tasks-pebble-*.pbw
            composeApp/output/*.zip
            composeApp/output/*.tar.gz
            composeApp/output/*.msix
            composeApp/output/*.deb
            artifacts/*.AppImage
            artifacts/*.AppImage.zsync

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          --generate-notes
          tasks-fdroid-*.apk
          tasks-googleplay-*.apk
          tasks-pebble-*.pbw
          composeApp/output/*.zip
          composeApp/output/*.tar.gz
          composeApp/output/*.msix
          composeApp/output/*.deb
          composeApp/output/*.appinstaller
          composeApp/output/metadata.properties
          composeApp/output/appcast-*.rss
          composeApp/output/Packages
          composeApp/output/Packages.xz
          composeApp/output/Release
          composeApp/output/InRelease
          artifacts/*.AppImage
          artifacts/*.AppImage.zsync
