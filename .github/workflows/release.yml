name: GitHub Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  bundle:
    uses: ./.github/workflows/bundle.yml
    secrets: inherit

  release:
    runs-on: ubuntu-latest
    needs: [ bundle ]
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Download Play-signed APK
        env:
          FASTLANE: ${{ secrets.FASTLANE }}
        run: |
          echo "$FASTLANE" > ./fastlane.json
          bundle exec fastlane download_signed_apk
          rm ./fastlane.json

      - uses: actions/download-artifact@v8
        with:
          name: app-generic-release.apk
          path: artifacts
      - uses: actions/download-artifact@v8
        with:
          name: pebble.pbw
          path: artifacts

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build desktop jar
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
        run: ./gradlew :composeApp:desktopJar

      - name: Install Conveyor
        run: npm install -g @hydraulic/conveyor

      - name: Build desktop releases
        working-directory: composeApp
        env:
          SIGNING_KEY: ${{ secrets.CONVEYOR_SIGNING_KEY }}
          CONVEYOR_AGREE_TO_LICENSE: 1
        run: |
          conveyor make site

      - name: Rename artifacts
        run: |
          TAG=${GITHUB_REF_NAME}
          mv artifacts/app-generic-release.apk "tasks-fdroid-${TAG}.apk"
          mv tasks-googleplay-release.apk "tasks-googleplay-${TAG}.apk"
          mv artifacts/pebble.pbw "tasks-pebble-${TAG}.pbw"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: release-artifacts
          path: |
            tasks-fdroid-*.apk
            tasks-googleplay-*.apk
            tasks-pebble-*.pbw
            composeApp/output/*.zip
            composeApp/output/*.tar.gz
            composeApp/output/*.msix
            composeApp/output/*.deb

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            tasks-fdroid-*.apk
            tasks-googleplay-*.apk
            tasks-pebble-*.pbw
            composeApp/output/*.zip
            composeApp/output/*.tar.gz
            composeApp/output/*.msix
            composeApp/output/*.deb
