include required("/stdlib/jdk/21/jetbrains.conf")
include required("#!bash -c '../gradlew -q :composeApp:printConveyorConfig | grep -v jvmstubs'")

app {
    display-name = "Tasks.org"
    rdns-name = org.tasks
    vendor = "Tasks.org, LLC"
    license = "GPL-3.0"
    vcs-url = "github.com/tasks/tasks"
    icons = ../graphics/icon.png

    site.base-url = "https://update.tasks.org"
    site.flat = true

    jvm {
        extract-native-libraries = true
        system-properties {
            jna.nosys = false
            jna.library.path = "<libpath>"
        }
    }

    // Signing key is provided via SIGNING_KEY env var in CI.
    // For local development, generate one with: conveyor keys generate
    signing-key = ${?SIGNING_KEY}

    mac {
        certificate = apple.cer
        notarization {
            issuer-id = ${?APPLE_ISSUER_ID}
            key-id = ${?APPLE_KEY_ID}
            private-key = ${?APPLE_PRIVATE_KEY_PATH}
        }
    }
}

conveyor.compatibility-level = 22
